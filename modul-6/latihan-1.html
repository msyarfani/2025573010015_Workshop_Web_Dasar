<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kalkulator Interaktif</title>

    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #1e293b, #0f172a);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .kalkulator {
        background: #0f172a;
        padding: 20px;
        border-radius: 20px;
        width: 260px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      }

      #display {
        width: 100%;
        height: 60px;
        border: none;
        border-radius: 10px;
        margin-bottom: 15px;
        font-size: 28px;
        text-align: right;
        padding: 10px;
        background: #020617;
        color: #22c55e;
      }

      .tombol {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }

      button {
        padding: 15px;
        font-size: 16px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        background: #1e293b;
        color: white;
        transition: 0.2s;
      }

      button:hover {
        background: #334155;
        transform: scale(1.05);
      }

      .operator {
        background: #3b82f6;
      }

      .operator:hover {
        background: #2563eb;
      }

      .equals {
        background: #22c55e;
        grid-column: span 2;
      }

      .equals:hover {
        background: #16a34a;
      }

      .clear {
        background: #ef4444;
        grid-column: span 2;
      }

      .clear:hover {
        background: #dc2626;
      }
    </style>
  </head>

  <body>
    <div class="kalkulator">
      <input type="text" id="display" value="0" disabled />

      <div class="tombol" id="container-tombol">
        <button data-value="7">7</button>
        <button data-value="8">8</button>
        <button data-value="9">9</button>
        <button class="operator" data-op="/">÷</button>

        <button data-value="4">4</button>
        <button data-value="5">5</button>
        <button data-value="6">6</button>
        <button class="operator" data-op="*">×</button>

        <button data-value="1">1</button>
        <button data-value="2">2</button>
        <button data-value="3">3</button>
        <button class="operator" data-op="-">−</button>

        <button data-value="0">0</button>
        <button data-value=".">.</button>
        <button class="operator" data-op="+">+</button>

        <button class="equals" data-action="equals">=</button>
        <button class="clear" data-action="clear">C</button>
      </div>
    </div>

    <script src="latihan-1.js"></script>
  </body>
</html>
