<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Tabel Nilai Mahasiswa</title>
    <style>
      table {
        border-collapse: collapse;
        width: 80%;
        margin: 20px auto;
        text-align: center;
      }
      th,
      td {
        border: 1px solid black;
        padding: 8px;
      }
      thead {
        background-color: #f2f2f2;
      }
      tfoot {
        background-color: #d9edf7;
        font-weight: bold;
      }
    </style>
  </head>

      </thead>

      <tbody>
        <tr>
          <td>1</td>

          <td>80</td>

          <td>82.5</td>

        <tr>

          <td>70</td>

          <td>72.5</td>

        <tr>

        <tr>

        <tr>

          <td>80</td>
          <td>77.5</td>
          <td>B</td>
        </tr>
      </tbody>

      <tfoot>
        <tr>
          <td colspan="2">Rata-rata</td>
          <td>75</td>
          <td>78.6</td>
          <td>76.8</td>
          <td>-</td>
        </tr>
      </tfoot>
    </table>
  </body>
</html>
