<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profil M. Syarfani</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <h1>Profil Diri</h1>
    </header>

    <nav>
      <a href="#tentang">Tentang</a>
      <a href="#keahlian">Keahlian</a>
      <a href="#pengalaman">Pengalaman</a>
      <a href="#kontak">Kontak</a>
    </nav>

    <main>
      <section id="tentang" class="tentang">
        <div class="bio">
          <h2>Tentang Saya</h2>

          <img
            src="profil.jpg.jpeg"
            width="250"
            height="250"
            alt="Foto profil mahasiswa"
          />

          <p>Nama: M. Syarfani</p>
          <p>Jurusan: Teknik Informatika</p>
          <p>Politeknik Negeri Lhokseumawe</p>
        </div>
      </section>

      <!-- SECTION KEAHLIAN -->
      <section id="keahlian">
        <h2>Keahlian</h2>

        <div>
          <span class="skill">HTML</span>
          <span class="skill">CSS</span>
          <span class="skill">JavaScript</span>
        </div>
      </section>

      <!-- SECTION PENGALAMAN -->
      <section id="pengalaman">
        <h2>Pengalaman</h2>

        <ol>
          <li>Sekolah SMA</li>
          <li>Kuliah TI</li>
          <li>Belajar Web</li>
        </ol>
      </section>

      <!-- SECTION KONTAK -->
      <section id="kontak">
        <h2>Kontak</h2>

        <form>
          <label>Nama</label>
          <input type="text" placeholder="Nama" />

          <label>Email</label>
          <input type="email" placeholder="Email" />

          <label>Tujuan</label>
          <select>
            <option>Pertanyaan</option>
            <option>Kerjasama</option>
          </select>

          <label>Pesan</label>
          <textarea placeholder="Pesan"></textarea>

          <button type="submit">Kirim</button>
        </form>
      </section>
    </main>

    <footer>
      <p>© 2026 M. Syarfani</p>
    </footer>
  </body>
</html>
