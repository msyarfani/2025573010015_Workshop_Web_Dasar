<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Latihan 1 - UI Styling</title>
    <link rel="stylesheet" href="latihan-1.css" />
  </head>
  <body>
    <h2>Komponen Button</h2>
    <button class="btn-primary">Primary</button>
    <button class="btn-secondary">Secondary</button>
    <button class="btn-danger">Danger</button>
    <button class="btn-outline">Outline</button>

    <h2>Komponen Badge</h2>
    <span class="badge badge-blue">Info</span>
    <span class="badge badge-green">Success</span>
    <span class="badge badge-red">Error</span>

    <h2>Komponen Alert</h2>
    <div class="alert success">✅ Data berhasil disimpan</div>
    <div class="alert warning">⚠️ Hati-hati! Periksa kembali</div>
    <div class="alert error">❌ Terjadi kesalahan</div>
  </body>
</html>
