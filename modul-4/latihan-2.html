<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Komponen Interaktif</title>
    <link rel="stylesheet" href="latihan-2.css" />
  </head>
  <body>
    <h2>1. Accordion / FAQ</h2>

    <details>
      <summary>Apa itu CSS Grid?</summary>
      <p>CSS Grid adalah sistem layout 2 dimensi di CSS.</p>
    </details>

    <details>
      <summary>Apa itu Flexbox?</summary>
      <p>Flexbox digunakan untuk layout 1 dimensi.</p>
    </details>

    <details>
      <summary>Kenapa belajar CSS?</summary>
      <p>Untuk membuat tampilan web lebih menarik.</p>
    </details>

    <h2>2. Image Hover Overlay</h2>

    <div class="gallery">
      <div class="img-box">
        <img src="https://picsum.photos/300?1" /><span>Gambar 1</span>
      </div>
      <div class="img-box">
        <img src="https://picsum.photos/300?2" /><span>Gambar 2</span>
      </div>
      <div class="img-box">
        <img src="https://picsum.photos/300?3" /><span>Gambar 3</span>
      </div>
      <div class="img-box">
        <img src="https://picsum.photos/300?4" /><span>Gambar 4</span>
      </div>
    </div>

    <h2>3. Progress Bar</h2>

    <div class="progress" style="--progress: 75%"></div>
    <div class="progress" style="--progress: 50%"></div>
    <div class="progress" style="--progress: 30%"></div>
  </body>
</html>
